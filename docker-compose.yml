version: "3.9"

services:
  postgres:
    image: timescale/timescaledb:latest-pg16
    environment:
      POSTGRES_DB: waybill
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      interval: 5s
      timeout: 5s
      retries: 5

  db-backup:
    build:
      context: ./infrastructure/docker/postgres
      dockerfile: Dockerfile.backup
    environment:
      POSTGRES_DB: "waybill"
      POSTGRES_USER: "postgres"
      POSTGRES_PASSWORD: "postgres"
      POSTGRES_HOST: "postgres"
      POSTGRES_PORT: "5432"
      BACKUP_SCHEDULE: "${BACKUP_SCHEDULE:-0 2 * * *}"
      BACKUP_RETENTION_DAYS: "${BACKUP_RETENTION_DAYS:-7}"
    volumes:
      - postgres_backups:/backups
    depends_on:
      postgres:
        condition: service_healthy

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.14.3
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=true
      - ELASTIC_PASSWORD=${ELASTIC_PASSWORD:-elastic_pass}
      - xpack.security.transport.ssl.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
    volumes:
      - es_data:/usr/share/elasticsearch/data

  zookeeper:
    image: confluentinc/cp-zookeeper:7.7.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"

  kafka:
    image: confluentinc/cp-kafka:7.7.0
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENERS: INTERNAL://0.0.0.0:29092,EXTERNAL://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka:29092,EXTERNAL://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"

  core-api:
    build:
      context: ./backend/core-api
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      PORT: "8080"
      DATABASE_URL: "postgres://postgres:postgres@postgres:5432/waybill?sslmode=disable"
      REDIS_URL: "redis://redis:6379/0"
      ELASTICSEARCH_URL: "http://elasticsearch:9200"
      ELASTICSEARCH_USERNAME: "elastic"
      ELASTICSEARCH_PASSWORD: "${ELASTIC_PASSWORD:-elastic_pass}"
      KAFKA_BROKERS: "kafka:29092"
      ADMIN_EMAIL: "${ADMIN_EMAIL:-admin@waybilltrack.com}"
      ADMIN_PASSWORD: "${ADMIN_PASSWORD:-teccadmin00}"
      JWT_SECRET: "${JWT_SECRET:?JWT_SECRET must be set in the environment}"
      ANALYTICS_API_URL: "http://analytics-api:8000"
      INTERNAL_API_KEY: "${INTERNAL_API_KEY:?INTERNAL_API_KEY must be set in the environment}"
      FRONTEND_URL: "${FRONTEND_URL:-http://localhost:3010}"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      elasticsearch:
        condition: service_started
      kafka:
        condition: service_started

  analytics-api:
    build:
      context: ./backend/analytics-api
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: "postgresql+asyncpg://postgres:postgres@postgres:5432/waybill"
      REDIS_URL: "redis://redis:6379/0"
      KAFKA_BROKERS: "kafka:29092"
      JWT_SECRET: "${JWT_SECRET:?JWT_SECRET must be set in the environment}"
      INTERNAL_API_KEY: "${INTERNAL_API_KEY:?INTERNAL_API_KEY must be set in the environment}"
      SENDER_EMAIL: "${SENDER_EMAIL:-noreply@waybilltracking.com}"
      SENDER_PHONE: "${SENDER_PHONE:-+12025551234}"
    volumes:
      - analytics_models:/app/app/models_data
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started

  celery-worker:
    build:
      context: ./backend/analytics-api
      dockerfile: Dockerfile
    command: celery -A app.workers.celery_app worker --loglevel=info
    environment:
      DATABASE_URL: "postgresql+asyncpg://postgres:postgres@postgres:5432/waybill"
      REDIS_URL: "redis://redis:6379/0"
      JWT_SECRET: "${JWT_SECRET:?JWT_SECRET must be set in the environment}"
      SENDGRID_KEY: "${SENDGRID_KEY:-}"
      TWILIO_SID: "${TWILIO_SID:-}"
      TWILIO_AUTH_TOKEN: "${TWILIO_AUTH_TOKEN:-}"
      SENDER_EMAIL: "${SENDER_EMAIL:-noreply@waybilltracking.com}"
      SENDER_PHONE: "${SENDER_PHONE:-+12025551234}"
    depends_on:
      - redis
      - analytics-api

  celery-beat:
    build:
      context: ./backend/analytics-api
      dockerfile: Dockerfile
    command: celery -A app.workers.celery_app beat --loglevel=info
    environment:
      DATABASE_URL: "postgresql+asyncpg://postgres:postgres@postgres:5432/waybill"
      REDIS_URL: "redis://redis:6379/0"
      JWT_SECRET: "${JWT_SECRET:?JWT_SECRET must be set in the environment}"
      SENDGRID_KEY: "${SENDGRID_KEY:-}"
      TWILIO_SID: "${TWILIO_SID:-}"
      TWILIO_AUTH_TOKEN: "${TWILIO_AUTH_TOKEN:-}"
      SENDER_EMAIL: "${SENDER_EMAIL:-noreply@waybilltracking.com}"
      SENDER_PHONE: "${SENDER_PHONE:-+12025551234}"
    depends_on:
      - redis
      - analytics-api

  dashboard:
    build:
      context: ./frontend/dashboard
      dockerfile: Dockerfile
    ports:
      - "5173:80"
    depends_on:
      - core-api

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./infrastructure/docker/nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./infrastructure/docker/nginx/certs:/etc/nginx/certs:ro
      - certbot_www:/var/www/certbot:ro
    depends_on:
      - core-api
      - analytics-api
      - dashboard

  prometheus:
    image: prom/prometheus:v2.54.0
    ports:
      - "9090:9090"
    volumes:
      - ./infrastructure/monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - ./infrastructure/monitoring/prometheus/alerts.yml:/etc/prometheus/alerts.yml
      - prometheus_data:/prometheus

  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:v0.15.0
    environment:
      DATA_SOURCE_NAME: "postgresql://postgres:postgres@postgres:5432/waybill?sslmode=disable"
    ports:
      - "9187:9187"
    depends_on:
      - postgres

  kafka-exporter:
    image: danielqsj/kafka-exporter:v1.7.0
    command: --kafka.server=kafka:29092
    ports:
      - "9308:9308"
    depends_on:
      - kafka

  loki:
    image: grafana/loki:3.0.0
    ports:
      - "3100:3100"
    volumes:
      - ./infrastructure/monitoring/loki/loki.yml:/etc/loki/loki.yml
      - loki_data:/loki
    command: -config.file=/etc/loki/loki.yml

  promtail:
    image: grafana/promtail:3.0.0
    volumes:
      - ./infrastructure/monitoring/promtail/promtail.yml:/etc/promtail/promtail.yml
      - /var/run/docker.sock:/var/run/docker.sock
    command: -config.file=/etc/promtail/promtail.yml
    depends_on:
      - loki

  grafana:
    image: grafana/grafana:11.1.3
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - ./infrastructure/monitoring/grafana/dashboards/datasource.yml:/etc/grafana/provisioning/datasources/datasource.yml
      - ./infrastructure/monitoring/grafana/dashboards/dashboards.yml:/etc/grafana/provisioning/dashboards/dashboards.yml
      - ./infrastructure/monitoring/grafana/dashboards:/var/lib/grafana/dashboards
      - grafana_data:/var/lib/grafana

volumes:
  postgres_data:
  postgres_backups:
  analytics_models:
  redis_data:
  es_data:
  prometheus_data:
  grafana_data:
  loki_data:
  certbot_www: