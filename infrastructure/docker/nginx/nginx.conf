events {
    worker_connections 1024;
}

http {
    # ── Upstreams ──────────────────────────────────────────────────────────────
    upstream core_api {
        server core-api:8080;
    }

    upstream analytics_api {
        server analytics-api:8000;
    }

    upstream dashboard {
        server dashboard:80;
    }

    # ── SSL / TLS settings (shared) ────────────────────────────────────────────
    ssl_certificate     /etc/nginx/certs/server.crt;
    ssl_certificate_key /etc/nginx/certs/server.key;

    # Only TLS 1.2 and 1.3 — drop obsolete SSLv3 / TLS 1.0 / 1.1
    ssl_protocols TLSv1.2 TLSv1.3;

    # Modern cipher suite (Mozilla Intermediate, 2024)
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256;
    ssl_prefer_server_ciphers off;

    # Session resumption — reduces TLS handshake overhead
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:10m;
    ssl_session_tickets off;

    # OCSP stapling (enable when using a real CA certificate)
    # ssl_stapling on;
    # ssl_stapling_verify on;
    # resolver 1.1.1.1 8.8.8.8 valid=300s;

    # ── Security headers (applied to all responses) ────────────────────────────
    add_header X-Frame-Options SAMEORIGIN always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

    # ── Proxy defaults ─────────────────────────────────────────────────────────
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 60s;

    # ── Server 1: HTTP — redirect everything to HTTPS ─────────────────────────
    server {
        listen 80;
        server_name waybill.local;

        # ACME challenge support for Certbot / Let's Encrypt
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ── Server 2: HTTPS — TLS-terminated reverse proxy ────────────────────────
    server {
        listen 443 ssl;
        http2 on;
        server_name waybill.local;

        # HTTP Strict Transport Security — 1 year, include subdomains
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

        # ── Frontend Dashboard ─────────────────────────────────────────────────
        location / {
            proxy_pass http://dashboard;
        }

        # ── Core API ───────────────────────────────────────────────────────────
        location /api/v1/core/ {
            rewrite ^/api/v1/core/(.*) /api/v1/$1 break;
            proxy_pass http://core_api;
        }

        # ── Analytics API ──────────────────────────────────────────────────────
        location /api/v1/analytics/ {
            proxy_pass http://analytics_api;
        }

        # ── Reports API ────────────────────────────────────────────────────────
        location /api/v1/reports/ {
            proxy_pass http://analytics_api;
        }

        # ── WebSocket (real-time tracking updates) ─────────────────────────────
        location /ws/ {
            proxy_pass http://core_api;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            # WebSocket connections can be long-lived
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
        }

        # ── Health check (no auth required) ───────────────────────────────────
        location /health {
            proxy_pass http://core_api;
            access_log off;
        }
    }
}