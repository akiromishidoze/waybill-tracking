groups:
  # ─── Service Availability ────────────────────────────────────────────────────
  - name: waybill.availability
    interval: 30s
    rules:
      - alert: InstanceDown
        expr: up == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Instance {{ $labels.instance }} is down"
          description: "{{ $labels.job }}/{{ $labels.instance }} has been unreachable for > 1 minute."

      - alert: CoreAPIDown
        expr: up{job="core-api"} == 0
        for: 1m
        labels:
          severity: critical
          service: core-api
        annotations:
          summary: "Core API is down"
          description: "core-api has not responded to scrapes for > 1 minute."

      - alert: AnalyticsAPIDown
        expr: up{job="analytics-api"} == 0
        for: 1m
        labels:
          severity: critical
          service: analytics-api
        annotations:
          summary: "Analytics API is down"
          description: "analytics-api has not responded to scrapes for > 1 minute."

  # ─── API Error Rates ─────────────────────────────────────────────────────────
  - name: waybill.api_errors
    interval: 30s
    rules:
      - alert: HighErrorRateCoreAPI
        expr: |
          (
            sum(rate(http_requests_total{job="core-api", status=~"5.."}[5m]))
            /
            sum(rate(http_requests_total{job="core-api"}[5m]))
          ) > 0.05
        for: 3m
        labels:
          severity: warning
          service: core-api
        annotations:
          summary: "Core API 5xx error rate is high"
          description: "core-api 5xx rate is {{ $value | humanizePercentage }} (threshold 5%) over the last 5 minutes."

      - alert: CriticalErrorRateCoreAPI
        expr: |
          (
            sum(rate(http_requests_total{job="core-api", status=~"5.."}[5m]))
            /
            sum(rate(http_requests_total{job="core-api"}[5m]))
          ) > 0.20
        for: 2m
        labels:
          severity: critical
          service: core-api
        annotations:
          summary: "Core API 5xx error rate is critical"
          description: "core-api 5xx rate is {{ $value | humanizePercentage }} (threshold 20%) over the last 5 minutes."

      - alert: HighErrorRateAnalyticsAPI
        expr: |
          (
            sum(rate(http_requests_total{job="analytics-api", status=~"5.."}[5m]))
            /
            sum(rate(http_requests_total{job="analytics-api"}[5m]))
          ) > 0.05
        for: 3m
        labels:
          severity: warning
          service: analytics-api
        annotations:
          summary: "Analytics API 5xx error rate is high"
          description: "analytics-api 5xx rate is {{ $value | humanizePercentage }} (threshold 5%) over the last 5 minutes."

      - alert: HighP95Latency
        expr: |
          histogram_quantile(
            0.95,
            sum by (job, le) (rate(http_request_duration_seconds_bucket[5m]))
          ) > 2
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High P95 request latency on {{ $labels.job }}"
          description: "P95 latency for {{ $labels.job }} is {{ $value | humanizeDuration }} (threshold 2s)."

      - alert: TrackEndpointSlowdown
        expr: |
          histogram_quantile(
            0.95,
            sum by (le) (rate(http_request_duration_seconds_bucket{job="core-api", handler="/track"}[5m]))
          ) > 1
        for: 5m
        labels:
          severity: warning
          service: core-api
        annotations:
          summary: "Public /track endpoint P95 latency > 1s"
          description: "P95 latency on /track is {{ $value | humanizeDuration }}."

  # ─── Database Connectivity ───────────────────────────────────────────────────
  - name: waybill.database
    interval: 30s
    rules:
      - alert: PostgreSQLDown
        expr: pg_up == 0
        for: 1m
        labels:
          severity: critical
          service: postgres
        annotations:
          summary: "PostgreSQL exporter reports database is down"
          description: "pg_up == 0 for instance {{ $labels.instance }}. Database may be unreachable."

      - alert: PostgreSQLHighConnections
        expr: |
          sum(pg_stat_activity_count) by (instance)
          /
          sum(pg_settings_max_connections) by (instance)
          > 0.80
        for: 5m
        labels:
          severity: warning
          service: postgres
        annotations:
          summary: "PostgreSQL connection pool is nearly exhausted"
          description: "{{ $labels.instance }} is using {{ $value | humanizePercentage }} of max_connections."

      - alert: PostgreSQLDeadlocks
        expr: rate(pg_stat_database_deadlocks[5m]) > 0
        for: 2m
        labels:
          severity: warning
          service: postgres
        annotations:
          summary: "PostgreSQL deadlocks detected"
          description: "Database {{ $labels.datname }} is experiencing {{ $value | humanize }} deadlocks/s."

      - alert: PostgreSQLSlowQueries
        expr: |
          max(pg_stat_activity_max_tx_duration{state="active"}) > 30
        for: 2m
        labels:
          severity: warning
          service: postgres
        annotations:
          summary: "PostgreSQL long-running transaction detected"
          description: "A transaction has been active for {{ $value | humanizeDuration }}."

  # ─── Kafka Consumer Lag ───────────────────────────────────────────────────────
  - name: waybill.kafka
    interval: 30s
    rules:
      - alert: KafkaConsumerLagHigh
        expr: |
          sum by (consumergroup, topic) (
            kafka_consumergroup_lag{topic=~"waybill.*|scan.*|notification.*"}
          ) > 1000
        for: 5m
        labels:
          severity: warning
          service: kafka
        annotations:
          summary: "Kafka consumer lag is high"
          description: "Consumer group {{ $labels.consumergroup }} on topic {{ $labels.topic }} has lag of {{ $value }} messages."

      - alert: KafkaConsumerLagCritical
        expr: |
          sum by (consumergroup, topic) (
            kafka_consumergroup_lag{topic=~"waybill.*|scan.*|notification.*"}
          ) > 10000
        for: 3m
        labels:
          severity: critical
          service: kafka
        annotations:
          summary: "Kafka consumer lag is critical"
          description: "Consumer group {{ $labels.consumergroup }} on topic {{ $labels.topic }} has lag of {{ $value }} messages. Processing is falling behind."

      - alert: KafkaConsumerGroupNotConsuming
        expr: |
          sum by (consumergroup, topic) (
            delta(kafka_consumergroup_current_offset{topic=~"waybill.*|scan.*|notification.*"}[10m])
          ) == 0
          and
          sum by (consumergroup, topic) (
            kafka_consumergroup_lag{topic=~"waybill.*|scan.*|notification.*"}
          ) > 100
        for: 10m
        labels:
          severity: critical
          service: kafka
        annotations:
          summary: "Kafka consumer group has stopped consuming"
          description: "Consumer group {{ $labels.consumergroup }} on topic {{ $labels.topic }} has not advanced its offset for 10 minutes with {{ $value }} messages pending."

      - alert: KafkaBrokerDown
        expr: |
          count(kafka_brokers) < 1
        for: 1m
        labels:
          severity: critical
          service: kafka
        annotations:
          summary: "No Kafka brokers available"
          description: "Kafka cluster reports 0 available brokers."