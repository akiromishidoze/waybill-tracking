version: "3.9"

services:
  postgres:
    image: timescale/timescaledb:2-pg16
    environment:
      POSTGRES_DB: waybill
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/core-api/migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.14.3
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
    volumes:
      - es_data:/usr/share/elasticsearch/data

  zookeeper:
    image: confluentinc/cp-zookeeper:7.7.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"

  kafka:
    image: confluentinc/cp-kafka:7.7.0
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"

  core-api:
    build:
      context: ./backend/core-api
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      PORT: "8080"
      DATABASE_URL: "postgres://postgres:postgres@postgres:5432/waybill?sslmode=disable"
      REDIS_URL: "redis://redis:6379/0"
      ELASTICSEARCH_URL: "http://elasticsearch:9200"
      KAFKA_BROKERS: "kafka:9092"
      JWT_SECRET: "${JWT_SECRET:-change-me-in-production}"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      elasticsearch:
        condition: service_started
      kafka:
        condition: service_started

  analytics-api:
    build:
      context: ./backend/analytics-api
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: "postgresql+asyncpg://postgres:postgres@postgres:5432/waybill"
      REDIS_URL: "redis://redis:6379/0"
      KAFKA_BROKERS: "kafka:9092"
      JWT_SECRET: "${JWT_SECRET:-change-me-in-production}"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started

  celery-worker:
    build:
      context: ./backend/analytics-api
      dockerfile: Dockerfile
    command: celery -A app.workers.celery_app worker --loglevel=info
    environment:
      DATABASE_URL: "postgresql+asyncpg://postgres:postgres@postgres:5432/waybill"
      REDIS_URL: "redis://redis:6379/0"
    depends_on:
      - redis
      - analytics-api

  dashboard:
    build:
      context: ./frontend/dashboard
      dockerfile: Dockerfile
    ports:
      - "5173:80"
    depends_on:
      - core-api

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./infrastructure/docker/nginx/nginx.conf:/etc/nginx/nginx.conf
    depends_on:
      - core-api
      - analytics-api
      - dashboard

  prometheus:
    image: prom/prometheus:v2.54.0
    ports:
      - "9090:9090"
    volumes:
      - ./infrastructure/monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus

  grafana:
    image: grafana/grafana:11.1.3
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - ./infrastructure/monitoring/grafana/dashboards/datasource.yml:/etc/grafana/provisioning/datasources/datasource.yml
      - ./infrastructure/monitoring/grafana/dashboards/dashboards.yml:/etc/grafana/provisioning/dashboards/dashboards.yml
      - ./infrastructure/monitoring/grafana/dashboards/service-overview.json:/var/lib/grafana/dashboards/service-overview.json
      - ./infrastructure/monitoring/grafana/dashboards/waybill-operations.json:/var/lib/grafana/dashboards/waybill-operations.json
      - ./infrastructure/monitoring/grafana/dashboards/infrastructure.json:/var/lib/grafana/dashboards/infrastructure.json
      - grafana_data:/var/lib/grafana

volumes:
  postgres_data:
  redis_data:
  es_data:
  prometheus_data:
  grafana_data:
